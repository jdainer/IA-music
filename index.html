    }
    .particle {

}

}

    }
    .header-actions i:hover {

    }
    .chat-messages {

        30% { transform: translateY(-8px); opacity: 1; }

</style>

    // ============================================
    // FUNCIONES DEL CHAT
    // ============================================

    function addMessage(text, isUser = true, isSongList = false, tone = '') {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
        
        if (isUser) {
            messageDiv.innerHTML = `
                <div class="bubble">
                    ${escapeHtml(text)}
                    <div style="font-size: 0.6rem; margin-top: 5px; color: rgba(255,255,255,0.4);">
                        <i class="far fa-clock"></i> ${getCurrentTime()}
                    </div>
                </div>
            `;
        } else {
            let bubbleContent = text;
            
            if (isSongList && tone && songsByTone[tone]) {
                const songs = songsByTone[tone];
                let songListHTML = `<div style="margin-top: 8px;"><strong>🎵 ${songs.length} canciones encontradas:</strong>`;
                songListHTML += `<ul class="song-list">`;
                songs.forEach(song => {
                    songListHTML += `<li>${escapeHtml(song)}</li>`;
                });
                songListHTML += `</ul></div>`;
                bubbleContent += songListHTML;
            }
            
            messageDiv.innerHTML = `

                <div class="bubble">
                    ${bubbleContent}
                    <div style="font-size: 0.6rem; margin-top: 5px; color: rgba(255,255,255,0.4);">

        }
        
        chatMessages.appendChild(messageDiv);

    }

    function showTypingIndicator() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.id = 'typingIndicator';

                <span style="width:8px;height:8px;background:#94a3b8;border-radius:50%;animation:typing 1.4s infinite;"></span>
                <span style="width:8px;height:8px;background:#94a3b8;border-radius:50%;animation:typing 1.4s infinite;animation-delay:0.2s;"></span>
                <span style="width:8px;height:8px;background:#94a3b8;border-radius:50%;animation:typing 1.4s infinite;animation-delay:0.4s;"></span>

        if (waitingForName) {

    // ============================================

    function showPersonalizedWelcome(name) {
        const msg = `
            ✨ ¡DIOS te bendiga, <strong style="color: #fcd34d;">${escapeHtml(name)}</strong>! ✨
            <br>
            "Recuerda Bendecir al Señor en todo tiempo; y que su alabanza esté de continuo en tu boca." 🎵

        conversationStage = 'chatting';
    }

    // ============================================
    // MOSTRAR CANCIONES POR TONO
    // ============================================
    function showSongsByTone(tone) {
        showTypingIndicator();
        
        setTimeout(() => {
            hideTypingIndicator();
            
            const normalizedTone = tone.toLowerCase().trim();
            
            if (songsByTone[normalizedTone]) {
                const songCount = songsByTone[normalizedTone].length;
                
                // Reproducir audio
                let audioFileName = normalizedTone.includes("mayor") 
                    ? normalizedTone.replace(" mayor", "") 
                    : normalizedTone.replace(" menor", "_m");
                
                const audioMap = {
                    "do": "do", "re": "re", "mi": "mi",
                    "fa": "fa", "sol": "sol", "la": "la", "si": "si"
                };
                
                if (audioMap[audioFileName]) {
                    audioFileName = audioMap[audioFileName];
                }
                
                try {
                    audioPlayer.src = `audios/${audioFileName}.mp3`;
                    audioPlayer.play().catch(err => {
                        console.warn("⚠️ Audio no disponible para:", audioFileName);
                    });
                } catch (error) {
                    console.warn("Error al reproducir audio:", error);
                }
                
                let personalizedMsg = `🎶 <strong>${normalizedTone}</strong> - ${songCount} canciones encontradas`;
                
                if (userName) {
                    personalizedMsg = `🎵 ¡Perfecto, <strong style="color: #fcd34d;">${escapeHtml(userName)}</strong>! Aquí tienes <strong>${songCount}</strong> canciones en <strong>${normalizedTone}</strong> <span class="song-count">🎵</span>`;
                }
                
                addMessage(personalizedMsg, false, true, normalizedTone);
                
            } else {
                const errorMsg = userName 
                    ? `❌ Lo siento, <strong style="color: #fcd34d;">${escapeHtml(userName)}</strong>, no tengo canciones registradas en el tono <strong>${normalizedTone}</strong>.`
                    : `❌ Lo siento, no tengo canciones registradas en el tono <strong>${normalizedTone}</strong>.`;
                addMessage(errorMsg, false);
            }
        }, 500);
    }

    // ============================================
    // BUSCAR CANCIONES
    // ============================================
    function searchSongs(query) {
        const searchTerm = query.toLowerCase().trim();
        
        if (searchTerm.length < 2) {
            addMessage("🔍 Escribe al menos 2 caracteres para buscar.", false);
            return;
        }

        showTypingIndicator();
        
        setTimeout(() => {
            hideTypingIndicator();
            
            let results = [];
            for (const tone in songsByTone) {
                songsByTone[tone].forEach(song => {
                    if (song.toLowerCase().includes(searchTerm)) {
                        results.push({ nombre: song, tono: tone });
                    }
                });
            }

            if (results.length > 0) {
                let message = `🔎 <strong>${results.length} resultados</strong> para "<em>${escapeHtml(searchTerm)}</em>":<br><br>`;
                
                const grouped = {};
                results.forEach(r => {
                    if (!grouped[r.tono]) grouped[r.tono] = [];
                    grouped[r.tono].push(r.nombre);
                });

                for (const tone in grouped) {
                    message += `<strong>🎵 ${tone}:</strong> `;
                    message += grouped[tone].map(s => `<span style="display:inline-block;background:rgba(124,58,237,0.2);padding:2px 8px;border-radius:12px;margin:2px;font-size:0.75rem;">${escapeHtml(s)}</span>`).join(' ');
                    message += '<br>';
                }

                addMessage(message, false);
            } else {
                const errorMsg = userName 
                    ? `❌ No encontré ninguna canción que contenga "<em>${escapeHtml(searchTerm)}</em>", <strong style="color: #fcd34d;">${escapeHtml(userName)}</strong>.`
                    : `❌ No encontré ninguna canción que contenga "<em>${escapeHtml(searchTerm)}</em>".`;
                addMessage(errorMsg, false);
            }
        }, 600);
    }

    // ============================================
    // PROCESAR MENSAJE DEL USUARIO
    // ============================================
    function processUserMessage(message) {
        const trimmed = message.trim();
        if (!trimmed) return;

        // Agregar mensaje del usuario
        addMessage(trimmed, true);
        messageInput.value = "";

        // ============================================
        // SI ESTAMOS ESPERANDO EL NOMBRE
        // ============================================
        if (waitingForName) {
            const nameParts = trimmed.split(' ');
            userName = nameParts[0];
            userName = userName.charAt(0).toUpperCase() + userName.slice(1).toLowerCase();
            
            waitingForName = false;
            showPersonalizedWelcome(userName);
            return;
        }

        // ============================================
        // SI EL USUARIO YA TIENE NOMBRE
        // ============================================
        
        // Verificar si el mensaje es un tono musical
        const toneMatch = trimmed.match(/\b(do|re|mi|fa|sol|la|si)\s*(mayor|menor)\b/i);
        if (toneMatch) {
            const tone = `${toneMatch[1].toLowerCase()} ${toneMatch[2].toLowerCase()}`;
            showSongsByTone(tone);
            return;
        }

        // Verificar si el usuario pregunta por el creador (por texto)
        if (trimmed.toLowerCase().includes('creador') || 
            trimmed.toLowerCase().includes('jhon') || 
            trimmed.toLowerCase().includes('arias') ||
            trimmed.toLowerCase().includes('quien te creó') ||
            trimmed.toLowerCase().includes('quién te creó')) {
            
            const msg = `
                👨‍💻 ¡Excelente pregunta, <strong style="color: #fcd34d;">${escapeHtml(userName)}</strong>!
                <br>
                Fui creado por <strong style="color: #fcd34d;">JHON DAINER ARIAS</strong>, un apasionado por la tecnología y la música.
                <br>
                si tienes listados de canciones que quieras que aparescan incluidas 
                📞 Puedes contactarlo al: <strong> 313 8094678</strong>
                📧 Email: <strong>jhondainerarias@gmail.com</strong>

            `;
            addMessage(msg, false);
            return;
        }

        // Verificar saludo
        if (trimmed.toLowerCase().match(/^(hola|buenos días|buenas tardes|buenas noches|hey|holi|saludos)/)) {
            const msg = `
                👋 ¡Hola de nuevo, <strong style="color: #fcd34d;">${escapeHtml(userName)}</strong>!
                <br><br>
                ¿Listo para explorar más música? 🎵
                <br>
                Selecciona un tono o busca una canción. ¡Estoy aquí para ayudarte!
            `;
            addMessage(msg, false);
            return;
        }

        // Verificar cómo está el bot
        if (trimmed.toLowerCase().includes('cómo estás') || trimmed.toLowerCase().includes('como estas') || trimmed.toLowerCase().includes('que tal')) {
            const msg = `
                😊 ¡Estoy genial, <strong style="color: #fcd34d;">${escapeHtml(userName)}</strong>!
                <br><br>
                Escuchando música todo el día y con muchas ganas de ayudarte a organizar tus canciones. 🎵
                <br>
                ¿Qué tono te gustaría explorar hoy?
            `;
            addMessage(msg, false);
            return;
        }

        // Si no es ninguna de las anteriores, buscar canciones
        searchSongs(trimmed);
    }

    // ============================================
    // UTILIDADES
    // ============================================

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function getCurrentTime() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        minutes = minutes.toString().padStart(2, '0');
        return `${hours}:${minutes} ${ampm}`;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML.replace(/\n/g, '<br>');
    }

    // ============================================
    // EVENT LISTENERS
    // ============================================

    // Botones de tonos musicales
    toneButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            if (waitingForName) {
                addMessage("👋 ¡Primero dime tu nombre para empezar!", false);
                return;
            }
            
            // Verificar si es el botón del creador
            if (btn.classList.contains('creador-btn')) {
                mostrarInfoCreador();
                return;
            }
            
            const tone = btn.getAttribute('data-tone');
            if (tone) {
                showSongsByTone(tone);
            }
        });
    });

    sendBtn.addEventListener('click', () => {
        const message = messageInput.value.trim();
        if (message) processUserMessage(message);
    });

    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const message = messageInput.value.trim();
            if (message) processUserMessage(message);
        }
    });

    // ============================================
    // INICIALIZAR CHAT
    // ============================================
    showWelcomeMessage();

    // ============================================
    // PARTÍCULAS DE FONDO
    // ============================================
    function createParticles() {
        const container = document.getElementById('particles');
        if (container) {
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.width = `${Math.random() * 6 + 2}px`;
                particle.style.height = particle.style.width;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDuration = `${Math.random() * 15 + 8}s`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(particle);
            }
        }
    }
    createParticles();

    console.log('%c🎵 Organizador Musical Personalizado - Listo', 'color: #7c3aed; font-size: 14px; font-weight: bold;');
});
</script>
